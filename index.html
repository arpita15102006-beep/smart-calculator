<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Calculator </title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --accent: #00e5a0;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #f0f2f7;
    --muted: #7a8090;
    --danger: #ef4444;
    --border: #2a3040;
    --glow: 0 0 20px rgba(0,229,160,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', 'Noto Sans Devanagari', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(0,229,160,0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 24px;
    width: 100%;
    max-width: 480px;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.2;
  }

  h1 span { color: var(--accent); }

  .lang-toggle {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
  }

  .lang-btn {
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .lang-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }

  .calculator {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  /* Display */
  .display {
    background: var(--bg);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    min-height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }

  .display-history {
    font-size: 13px;
    color: var(--muted);
    min-height: 18px;
    text-align: right;
    word-break: break-all;
  }

  .display-main {
    font-size: 44px;
    font-weight: 700;
    text-align: right;
    letter-spacing: -1px;
    color: var(--text);
    word-break: break-all;
    line-height: 1;
  }

  .status-bar {
    position: absolute;
    top: 10px;
    left: 14px;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }

  .status-dot.active {
    background: var(--accent);
    animation: pulse 1s infinite;
  }

  .status-label {
    font-size: 11px;
    color: var(--muted);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Feature Buttons */
 .feature-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 14px;
}
  }

  .feature-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
  }

  .feature-btn:hover { border-color: var(--accent); transform: translateY(-1px); }

  .feature-btn.voice { border-color: rgba(124,58,237,0.4); }
  .feature-btn.camera { border-color: rgba(245,158,11,0.4); }

  .feature-btn.listening {
    border-color: var(--accent2);
    background: rgba(124,58,237,0.15);
    animation: borderPulse 1.5s infinite;
  }

  @keyframes borderPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(124,58,237,0); }
  }

  .feature-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .voice .feature-icon { background: rgba(124,58,237,0.2); }
  .camera .feature-icon { background: rgba(245,158,11,0.15); }

  .feature-text { flex: 1; text-align: left; }
  .feature-title { font-weight: 600; font-size: 13px; }
  .feature-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* Calculator Grid */
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .btn {
    height: 64px;
    border-radius: 14px;
    border: 1px solid transparent;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  .btn:active { transform: scale(0.95); }

  .btn-num {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border);
  }
  .btn-num:hover { background: #252b3b; border-color: #3a4050; }

  .btn-op {
    background: rgba(0,229,160,0.1);
    color: var(--accent);
    border-color: rgba(0,229,160,0.25);
  }
  .btn-op:hover { background: rgba(0,229,160,0.18); }

  .btn-eq {
    background: var(--accent);
    color: #000;
    font-size: 22px;
    grid-column: span 1;
  }
  .btn-eq:hover { background: #00ffb3; box-shadow: var(--glow); }

  .btn-clear {
    background: rgba(239,68,68,0.12);
    color: var(--danger);
    border-color: rgba(239,68,68,0.25);
  }
  .btn-clear:hover { background: rgba(239,68,68,0.2); }

  .btn-fn {
    background: rgba(124,58,237,0.1);
    color: #a78bfa;
    border-color: rgba(124,58,237,0.2);
    font-size: 14px;
  }
  .btn-fn:hover { background: rgba(124,58,237,0.18); }

  .btn-zero { grid-column: span 2; }

  /* Panels */
  .panel {
    display: none;
    width: 100%;
    background: #1e2330;
    color: #f0f2f7;
    border: 1px solid #2a3040;
    border-radius: 16px;
    padding: 16px;
    margin-top: 14px;
}

  .panel.open { display: block; }

  .panel-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Voice Panel */
  .voice-visualizer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 50px;
    margin-bottom: 12px;
  }

  .bar {
    width: 4px;
    background: var(--accent2);
    border-radius: 2px;
    transition: height 0.1s;
    height: 6px;
  }

  .voice-visualizer.active .bar { animation: wave 0.6s ease-in-out infinite alternate; }
  .bar:nth-child(1) { animation-delay: 0s; }
  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.2s; }
  .bar:nth-child(4) { animation-delay: 0.3s; }
  .bar:nth-child(5) { animation-delay: 0.4s; }
  .bar:nth-child(6) { animation-delay: 0.5s; }
  .bar:nth-child(7) { animation-delay: 0.6s; }

  @keyframes wave {
    from { height: 6px; }
    to { height: 36px; }
  }

  .voice-transcript {
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);
    min-height: 40px;
    text-align: center;
    border: 1px solid var(--border);
    margin-bottom: 10px;
  }

  .voice-hint {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }

  .voice-examples {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
    justify-content: center;
  }

  .voice-example {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .voice-example:hover { border-color: var(--accent2); color: var(--text); }

  /* Camera Panel */
  .camera-area {
    position: relative;
    background: var(--bg);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 10px;
  }

  #cameraFeed {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  #cameraCanvas { display: none; }

  .camera-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(13,15,20,0.85);
  }

  .camera-overlay.hidden { display: none; }

  .camera-icon-big { font-size: 40px; }

  .camera-overlay p {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    padding: 0 20px;
  }

  .camera-controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .cam-btn {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    transition: all 0.2s;
  }
  .cam-btn:hover { border-color: var(--accent3); color: var(--accent3); }

  .cam-btn.primary {
    background: rgba(245,158,11,0.15);
    border-color: rgba(245,158,11,0.4);
    color: var(--accent3);
  }

  .ocr-result {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    min-height: 36px;
    text-align: center;
    margin-top: 8px;
    color: var(--muted);
  }

  /* History */
  .history-panel {
    margin-top: 14px;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
  }

  .history-item:hover { background: var(--surface2); border-color: var(--border); }
  .history-expr { color: var(--muted); }
  .history-result { color: var(--accent); font-weight: 600; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Mode toggle */
  .mode-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .mode-tab {
    flex: 1;
    padding: 7px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .mode-tab.active { background: var(--surface2); color: var(--text); }

  /* Responsive */
  @media (max-width: 400px) {
    .btn { height: 56px; font-size: 16px; }
    .display-main { font-size: 36px; }
  }
</style>
</head>
<body>

<header>
  
  <h1>Smart <span>Calculator</span><br></h1>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">English</button>
    <button class="lang-btn" onclick="setLang('hi')">हिंदी</button>
  </div>
</header>

<div class="calculator">

  <!-- Display -->
  <div class="display">
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusLabel"></span>
    </div>
    <div class="display-history" id="displayHistory"></div>
    <div class="display-main" id="displayMain">0</div>
  </div>

  <!-- Mode Tabs -->
  <div class="mode-row">
    <button class="mode-tab active" onclick="setMode('basic')" id="tabBasic" data-en="Basic" data-hi="बेसिक">Basic</button>
    <button class="mode-tab" onclick="setMode('sci')" id="tabSci" data-en="Scientific" data-hi="वैज्ञानिक">Scientific</button>
    <button class="mode-tab" onclick="setMode('history')" id="tabHistory" data-en="History" data-hi="इतिहास">History</button>
  </div>

  <!-- Feature Buttons -->
  <div class="feature-row">
    <button class="feature-btn voice" id="voiceBtn" onclick="toggleVoice()">
      <div class="feature-icon">🎤</div>
      <div class="feature-text">
        <div class="feature-title" data-en="Voice Input" data-hi="आवाज़ से">Voice Input</div>
        <div class="feature-sub" data-en="Speak a calculation" data-hi="बोलकर हिसाब करें">Speak a calculation</div>
      </div>
    </button>
    
  </div>

  <!-- Voice Panel -->
  <div class="panel voice-panel" id="voicePanel">
    <div class="panel-title" data-en="🎤 VOICE ASSISTANT" data-hi="🎤 आवाज़ सहायक">🎤 VOICE ASSISTANT</div>
    <div class="voice-visualizer" id="voiceViz">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="voice-transcript" id="voiceTranscript" data-en="Say something..." data-hi="कुछ बोलें...">Say something...</div>
    <div class="voice-hint" data-en='Try: "fifteen plus twenty seven" or "what is 8 times 9"' data-hi='"पंद्रह जमा सत्ताईस" या "आठ गुना नौ क्या है" बोलें'>Try: "fifteen plus twenty seven" or "what is 8 times 9"</div>
    <div class="voice-examples">
      <div class="voice-example" onclick="simulateVoice('15 + 27')">15 + 27</div>
      <div class="voice-example" onclick="simulateVoice('8 * 9')">8 × 9</div>
      <div class="voice-example" onclick="simulateVoice('100 / 4')">100 ÷ 4</div>
      <div class="voice-example" onclick="simulateVoice('sqrt(144)')">√144</div>
      <div class="voice-example" onclick="simulateVoice('25 - 13')">25 − 13</div>
    </div>
  </div>

  <!-- Camera Panel -->
  <div class="panel" id="cameraPanel">
    <div class="panel-title" data-en="📷 CAMERA SEARCH" data-hi="📷 कैमरा खोज">📷 CAMERA SEARCH</div>
    <div class="camera-area">
      <video id="cameraFeed" autoplay playsinline muted></video>
      <canvas id="cameraCanvas"></canvas>
      <div class="camera-overlay" id="cameraOverlay">
        <div class="camera-icon-big">📸</div>
        <p data-en="Point your camera at a math problem and tap Capture" data-hi="कैमरे को गणित के सवाल पर रखें और Capture दबाएं">Point your camera at a math problem and tap Capture</p>
        <button class="cam-btn primary" onclick="startCamera()" data-en="Open Camera" data-hi="कैमरा खोलें">Open Camera</button>
      </div>
    </div>
    <div class="camera-controls">
      <button class="cam-btn" onclick="startCamera()" data-en="📷 Start" data-hi="📷 शुरू">📷 Start</button>
      <button class="cam-btn primary" onclick="capturePhoto()" data-en="⚡ Capture" data-hi="⚡ कैप्चर">⚡ Capture</button>
      <button class="cam-btn" onclick="uploadPhoto()" data-en="🖼 Upload" data-hi="🖼 अपलोड">🖼 Upload</button>
    </div>
    <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="processUploadedPhoto(event)">
    <div class="ocr-result" id="ocrResult" data-en="Detected expression will appear here" data-hi="पहचाना गया सवाल यहाँ दिखेगा">Detected expression will appear here</div>
  </div>

  <!-- History Panel -->
  <div class="panel" id="historyPanel">
    <div class="panel-title" data-en="📋 HISTORY" data-hi="📋 इतिहास">📋 HISTORY</div>
    <div id="historyList"></div>
  </div>

  <!-- Calculator Buttons -->
  <div id="basicGrid" class="btn-grid">
    <button class="btn btn-clear" onclick="clearAll()">AC</button>
    <button class="btn btn-fn" onclick="toggleSign()">+/−</button>
    <button class="btn btn-fn" onclick="percent()">%</button>
    <button class="btn btn-op" onclick="pressOp('/')">÷</button>

    <button class="btn btn-num" onclick="pressNum('7')">7</button>
    <button class="btn btn-num" onclick="pressNum('8')">8</button>
    <button class="btn btn-num" onclick="pressNum('9')">9</button>
    <button class="btn btn-op" onclick="pressOp('*')">×</button>

    <button class="btn btn-num" onclick="pressNum('4')">4</button>
    <button class="btn btn-num" onclick="pressNum('5')">5</button>
    <button class="btn btn-num" onclick="pressNum('6')">6</button>
    <button class="btn btn-op" onclick="pressOp('-')">−</button>

    <button class="btn btn-num" onclick="pressNum('1')">1</button>
    <button class="btn btn-num" onclick="pressNum('2')">2</button>
    <button class="btn btn-num" onclick="pressNum('3')">3</button>
    <button class="btn btn-op" onclick="pressOp('+')">+</button>

    <button class="btn btn-num btn-zero" onclick="pressNum('0')">0</button>
    <button class="btn btn-num" onclick="pressDot()">.</button>
    <button class="btn btn-eq" onclick="calculate()">=</button>
  </div>

  <!-- Scientific Grid -->
  <div id="sciGrid" class="btn-grid" style="display:none">
    <button class="btn btn-fn" onclick="sciFunc('sin')">sin</button>
    <button class="btn btn-fn" onclick="sciFunc('cos')">cos</button>
    <button class="btn btn-fn" onclick="sciFunc('tan')">tan</button>
    <button class="btn btn-fn" onclick="sciFunc('log')">log</button>

    <button class="btn btn-fn" onclick="sciFunc('sqrt')">√x</button>
    <button class="btn btn-fn" onclick="sciFunc('sq')">x²</button>
    <button class="btn btn-fn" onclick="pressOp('^')">xʸ</button>
    <button class="btn btn-fn" onclick="sciFunc('pi')">π</button>

    <button class="btn btn-fn" onclick="sciFunc('ln')">ln</button>
    <button class="btn btn-fn" onclick="sciFunc('abs')">|x|</button>
    <button class="btn btn-fn" onclick="pressNum('(')">( </button>
    <button class="btn btn-fn" onclick="pressNum(')')"> )</button>

    <button class="btn btn-clear" onclick="clearAll()">AC</button>
    <button class="btn btn-fn" onclick="backspace()">⌫</button>
    <button class="btn btn-op" onclick="pressOp('%')">mod</button>
    <button class="btn btn-op" onclick="pressOp('/')">÷</button>

    <button class="btn btn-num" onclick="pressNum('7')">7</button>
    <button class="btn btn-num" onclick="pressNum('8')">8</button>
    <button class="btn btn-num" onclick="pressNum('9')">9</button>
    <button class="btn btn-op" onclick="pressOp('*')">×</button>

    <button class="btn btn-num" onclick="pressNum('4')">4</button>
    <button class="btn btn-num" onclick="pressNum('5')">5</button>
    <button class="btn btn-num" onclick="pressNum('6')">6</button>
    <button class="btn btn-op" onclick="pressOp('-')">−</button>

    <button class="btn btn-num" onclick="pressNum('1')">1</button>
    <button class="btn btn-num" onclick="pressNum('2')">2</button>
    <button class="btn btn-num" onclick="pressNum('3')">3</button>
    <button class="btn btn-op" onclick="pressOp('+')">+</button>

    <button class="btn btn-num btn-zero" onclick="pressNum('0')">0</button>
    <button class="btn btn-num" onclick="pressDot()">.</button>
    <button class="btn btn-eq" onclick="calculate()">=</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────
// STATE
// ──────────────────────────────────────────
let expression = '';
let result = '';
let history = [];
let lang = 'en';
let currentMode = 'basic';
let voiceActive = false;
let cameraStream = null;
let recognition = null;

// ──────────────────────────────────────────
// LANGUAGE
// ──────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn:${l === 'en' ? 'first-child' : 'last-child'}`).classList.add('active');
  
  // Update all data-lang elements
  document.querySelectorAll('[data-en]').forEach(el => {
    const key = l === 'hi' ? 'data-hi' : 'data-en';
    const val = el.getAttribute(key);
    if (val) {
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = val;
      else el.textContent = val;
    }
  });

  // Update voice transcript placeholder if idle
  const vt = document.getElementById('voiceTranscript');
  vt.textContent = l === 'hi' ? 'कुछ बोलें...' : 'Say something...';

  // Update ocr placeholder
  const ocr = document.getElementById('ocrResult');
  if (ocr.textContent.includes('Detected') || ocr.textContent.includes('यहाँ')) {
    ocr.textContent = l === 'hi' ? 'पहचाना गया सवाल यहाँ दिखेगा' : 'Detected expression will appear here';
  }

  // Update camera overlay text
  document.querySelectorAll('[data-hi]').forEach(el => {
    if (el.getAttribute('data-hi')) {
      if (el.textContent === el.getAttribute('data-en') || el.textContent === el.getAttribute('data-hi')) {
        el.textContent = el.getAttribute(l === 'hi' ? 'data-hi' : 'data-en');
      }
    }
  });
}

// ──────────────────────────────────────────
// DISPLAY
// ──────────────────────────────────────────
function updateDisplay(val, hist = '') {
  const d = document.getElementById('displayMain');
  d.textContent = val || '0';
  document.getElementById('displayHistory').textContent = hist;
}

function setStatus(label, active = false) {
  document.getElementById('statusDot').className = 'status-dot' + (active ? ' active' : '');
  document.getElementById('statusLabel').textContent = label;
}

// ──────────────────────────────────────────
// CALCULATOR LOGIC
// ──────────────────────────────────────────
function pressNum(n) {
  if (result) { expression = ''; result = ''; }
  expression += n;
  updateDisplay(formatExpr(expression));
  setStatus('');
}

function pressOp(op) {
  if (result) { expression = result; result = ''; }
  if (expression === '' && op !== '-') return;
  expression += op;
  updateDisplay(formatExpr(expression));
}

function pressDot() {
  const parts = expression.split(/[\+\-\*\/]/);
  const last = parts[parts.length - 1];
  if (last.includes('.')) return;
  if (!last) expression += '0';
  expression += '.';
  updateDisplay(formatExpr(expression));
}

function clearAll() {
  expression = '';
  result = '';
  updateDisplay('0');
  setStatus('');
}

function backspace() {
  expression = expression.slice(0, -1);
  updateDisplay(formatExpr(expression) || '0');
}

function toggleSign() {
  if (!expression) return;
  if (expression.startsWith('-')) expression = expression.slice(1);
  else expression = '-' + expression;
  updateDisplay(formatExpr(expression));
}

function percent() {
  if (!expression) return;
  try {
    const val = eval(expression) / 100;
    expression = String(val);
    updateDisplay(formatExpr(expression));
  } catch(e) {}
}

function sciFunc(fn) {
  let val = parseFloat(expression) || 0;
  let res;
  try {
    switch(fn) {
      case 'sin': res = Math.sin(val * Math.PI / 180); break;
      case 'cos': res = Math.cos(val * Math.PI / 180); break;
      case 'tan': res = Math.tan(val * Math.PI / 180); break;
      case 'log': res = Math.log10(val); break;
      case 'ln':  res = Math.log(val); break;
      case 'sqrt': res = Math.sqrt(val); break;
      case 'sq':  res = val * val; break;
      case 'abs': res = Math.abs(val); break;
      case 'pi':  expression += Math.PI.toFixed(8); updateDisplay(formatExpr(expression)); return;
    }
    const hist = `${fn}(${expression})`;
    result = String(round(res));
    expression = '';
    addHistory(hist, result);
    updateDisplay(result, hist + ' =');
    setStatus(lang === 'hi' ? 'परिणाम' : 'Result');
  } catch(e) {
    updateDisplay(lang === 'hi' ? 'त्रुटि' : 'Error');
  }
}

function calculate() {
  if (!expression) return;
  try {
    const hist = formatExpr(expression);
    // Replace ^ with Math.pow
    let expr = expression.replace(/\^/g, '**').replace(/%/g, '%');
    let res = eval(expr);
    if (typeof res !== 'number' || !isFinite(res)) throw new Error();
    result = String(round(res));
    addHistory(hist, result);
    updateDisplay(result, hist + ' =');
    expression = result;
    result = '';
    setStatus(lang === 'hi' ? 'परिणाम' : 'Result');
  } catch(e) {
    updateDisplay(lang === 'hi' ? 'त्रुटि' : 'Error');
    expression = '';
    setStatus(lang === 'hi' ? 'त्रुटि!' : 'Error!');
  }
}

function round(n) {
  return Math.round(n * 1e10) / 1e10;
}

function formatExpr(e) {
  return e.replace(/\*/g, '×').replace(/\//g, '÷');
}

// ──────────────────────────────────────────
// HISTORY
// ──────────────────────────────────────────
function addHistory(expr, res) {
  history.unshift({ expr, res });
  if (history.length > 20) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = `<p style="text-align:center;color:var(--muted);font-size:13px;padding:10px 0">${lang === 'hi' ? 'कोई इतिहास नहीं' : 'No history yet'}</p>`;
    return;
  }
  list.innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <span class="history-expr">${formatExpr(h.expr)}</span>
      <span class="history-result">= ${h.res}</span>
    </div>
  `).join('');
}

function loadHistory(i) {
  expression = history[i].res;
  updateDisplay(expression);
  setMode('basic');
}

// ──────────────────────────────────────────
// MODE
// ──────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  ['basic', 'sci', 'history'].forEach(m => {
    document.getElementById(`tab${m.charAt(0).toUpperCase()+m.slice(1)}`).classList.toggle('active', m === mode);
  });
  document.getElementById('basicGrid').style.display = mode === 'basic' ? 'grid' : 'none';
  document.getElementById('sciGrid').style.display = mode === 'sci' ? 'grid' : 'none';
  document.getElementById('historyPanel').classList.toggle('open', mode === 'history');
  if (mode === 'history') renderHistory();
}

// ──────────────────────────────────────────
// VOICE ASSISTANT
// ──────────────────────────────────────────
function toggleVoice() {
  if (voiceActive) {
    stopVoice();
  } else {
    startVoice();
  }
}

function startVoice() {
  const panel = document.getElementById('voicePanel');
  panel.classList.add('open');
  
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast(lang === 'hi' ? '❌ आपका ब्राउज़र आवाज़ नहीं पहचानता' : '❌ Browser does not support voice recognition');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = lang === 'hi' ? 'hi-IN' : 'en-US';

  recognition.onstart = () => {
    voiceActive = true;
    document.getElementById('voiceBtn').classList.add('listening');
    document.getElementById('voiceViz').classList.add('active');
    setStatus(lang === 'hi' ? 'सुन रहे हैं...' : 'Listening...', true);
    document.getElementById('voiceTranscript').textContent = lang === 'hi' ? '🎤 सुन रहे हैं...' : '🎤 Listening...';
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('voiceTranscript').textContent = transcript;
    
    if (e.results[0].isFinal) {
      processVoiceInput(transcript);
    }
  };

  recognition.onerror = (e) => {
    stopVoice();
    showToast(lang === 'hi' ? '❌ आवाज़ नहीं सुनाई दी। दोबारा कोशिश करें' : '❌ Could not hear. Try again.');
  };

  recognition.onend = () => stopVoice();
  recognition.start();
}

function stopVoice() {
  voiceActive = false;
  document.getElementById('voiceBtn').classList.remove('listening');
  document.getElementById('voiceViz').classList.remove('active');
  setStatus('');
  if (recognition) { try { recognition.stop(); } catch(e) {} }
}

function processVoiceInput(text) {
  let expr = text.toLowerCase()
    // English words
    .replace(/what is|calculate|equals?|result of/gi, '')
    .replace(/\bplus\b/gi, '+').replace(/\badd\b/gi, '+')
    .replace(/\bminus\b|\bsubtract\b/gi, '-')
    .replace(/\btimes\b|\bmultiply(?: by)?\b/gi, '*')
    .replace(/\bdivide(?: by)?\b|\bdivided by\b/gi, '/')
    .replace(/\bsquare root of\b|\broot of\b/gi, 'sqrt')
    .replace(/\bsquared\b|\bto the power of 2\b/gi, '**2')
    .replace(/\bpercent\b/gi, '/100')
    .replace(/\bpi\b/gi, Math.PI.toString())
    // Hindi words
    .replace(/जमा|प्लस|और/gi, '+')
    .replace(/घटा|माइनस/gi, '-')
    .replace(/गुणा|गुना|बार/gi, '*')
    .replace(/भाग|विभाजित|से भाग/gi, '/')
    .replace(/वर्गमूल|रूट/gi, 'sqrt')
    .replace(/प्रतिशत/gi, '/100')
    // Number words EN
    .replace(/\bzero\b/gi,'0').replace(/\bone\b/gi,'1').replace(/\btwo\b/gi,'2')
    .replace(/\bthree\b/gi,'3').replace(/\bfour\b/gi,'4').replace(/\bfive\b/gi,'5')
    .replace(/\bsix\b/gi,'6').replace(/\bseven\b/gi,'7').replace(/\beight\b/gi,'8')
    .replace(/\bnine\b/gi,'9').replace(/\bten\b/gi,'10').replace(/\beleven\b/gi,'11')
    .replace(/\btwelve\b/gi,'12').replace(/\bthirteen\b/gi,'13').replace(/\bfourteen\b/gi,'14')
    .replace(/\bfifteen\b/gi,'15').replace(/\bsixteen\b/gi,'16').replace(/\bseventeen\b/gi,'17')
    .replace(/\beighteen\b/gi,'18').replace(/\bnineteen\b/gi,'19').replace(/\btwenty\b/gi,'20')
    .replace(/\bthirty\b/gi,'30').replace(/\bforty\b/gi,'40').replace(/\bfifty\b/gi,'50')
    .replace(/\bsixty\b/gi,'60').replace(/\bseventy\b/gi,'70').replace(/\beighty\b/gi,'80')
    .replace(/\bninety\b/gi,'90').replace(/\bhundred\b/gi,'100').replace(/\bthousand\b/gi,'1000')
    // Hindi number words
    .replace(/शून्य/gi,'0').replace(/एक/gi,'1').replace(/दो/gi,'2').replace(/तीन/gi,'3')
    .replace(/चार/gi,'4').replace(/पाँच/gi,'5').replace(/छह/gi,'6').replace(/सात/gi,'7')
    .replace(/आठ/gi,'8').replace(/नौ/gi,'9').replace(/दस/gi,'10').replace(/पंद्रह/gi,'15')
    .replace(/बीस/gi,'20').replace(/तीस/gi,'30').replace(/पचास/gi,'50').replace(/सौ/gi,'100')
    .replace(/हज़ार|हजार/gi,'1000')
    .trim();

  // Handle sqrt
  if (expr.includes('sqrt')) {
    const match = expr.match(/sqrt\s*(\d+\.?\d*)/);
    if (match) {
      const val = parseFloat(match[1]);
      const res = Math.sqrt(val);
      document.getElementById('voiceTranscript').textContent = `√${val} = ${round(res)}`;
      addHistory(`√${val}`, String(round(res)));
      updateDisplay(String(round(res)), `√${val} =`);
      expression = String(round(res));
      speak(lang === 'hi' ? `${val} का वर्गमूल ${round(res)} है` : `Square root of ${val} is ${round(res)}`);
      return;
    }
  }

  expr = expr.replace(/[^0-9+\-*/.()^%\s]/g, '').trim();

  if (!expr) {
    showToast(lang === 'hi' ? '❌ समझ नहीं आया। दोबारा बोलें' : '❌ Could not understand. Try again.');
    return;
  }

  try {
    expression = expr.replace(/\s/g, '');
    const res = eval(expression.replace(/\^/g, '**'));
    if (!isFinite(res)) throw new Error();
    result = String(round(res));
    addHistory(formatExpr(expression), result);
    updateDisplay(result, formatExpr(expression) + ' =');
    document.getElementById('voiceTranscript').textContent = `${formatExpr(expression)} = ${result}`;
    speak(lang === 'hi' ? `उत्तर है ${result}` : `The answer is ${result}`);
    expression = result; result = '';
    setStatus(lang === 'hi' ? 'परिणाम' : 'Result');
  } catch(e) {
    showToast(lang === 'hi' ? '❌ गणना में त्रुटि' : '❌ Could not calculate that');
  }
}

function simulateVoice(expr) {
  document.getElementById('voicePanel').classList.add('open');
  document.getElementById('voiceTranscript').textContent = formatExpr(expr);
  expression = expr;
  calculate();
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang === 'hi' ? 'hi-IN' : 'en-US';
  utt.rate = 0.9;
  speechSynthesis.speak(utt);
}

// ──────────────────────────────────────────
// CAMERA
// ──────────────────────────────────────────
function toggleCamera() {
  const panel = document.getElementById('cameraPanel');
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    stopCameraStream();
  } else {
    panel.classList.add('open');
  }
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    cameraStream = stream;
    const video = document.getElementById('cameraFeed');
    video.srcObject = stream;
    document.getElementById('cameraOverlay').classList.add('hidden');
    setStatus(lang === 'hi' ? 'कैमरा चालू' : 'Camera On', true);
    showToast(lang === 'hi' ? '📷 कैमरा चालू हो गया' : '📷 Camera started');
  } catch(e) {
    showToast(lang === 'hi' ? '❌ कैमरा अनुमति नहीं मिली' : '❌ Camera permission denied');
  }
}

function stopCameraStream() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  document.getElementById('cameraOverlay').classList.remove('hidden');
  setStatus('');
}

function capturePhoto() {
  const video = document.getElementById('cameraFeed');
  if (!cameraStream) { showToast(lang === 'hi' ? '📷 पहले कैमरा खोलें' : '📷 Start camera first'); return; }
  
  const canvas = document.getElementById('cameraCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  
  const imgData = canvas.toDataURL('image/jpeg');
  processImageWithAI(imgData);
}

function uploadPhoto() {
  document.getElementById('photoInput').click();
}

function processUploadedPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => processImageWithAI(ev.target.result);
  reader.readAsDataURL(file);
}

async function processImageWithAI(imageData) {
  const ocrEl = document.getElementById('ocrResult');
  ocrEl.style.color = 'var(--accent3)';
  ocrEl.textContent = lang === 'hi' ? '⏳ सवाल पहचाना जा रहा है...' : '⏳ Detecting math expression...';
  setStatus(lang === 'hi' ? 'विश्लेषण...' : 'Analyzing...', true);

  try {
    const base64 = imageData.split(',')[1];
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: base64 }
            },
            {
              type: 'text',
              text: 'Look at this image and extract any mathematical expression or equation you see. Return ONLY the mathematical expression in plain text format suitable for eval() in JavaScript (use +, -, *, / symbols). If you see "5 + 3", return "5+3". If no math is found, return "NO_MATH_FOUND". Return nothing else, no explanation.'
            }
          ]
        }]
      })
    });

    const data = await response.json();
    const detected = data.content?.[0]?.text?.trim() || 'NO_MATH_FOUND';

    if (detected === 'NO_MATH_FOUND') {
      ocrEl.style.color = 'var(--danger)';
      ocrEl.textContent = lang === 'hi' ? '❌ कोई गणित का सवाल नहीं मिला' : '❌ No math expression detected';
      setStatus('');
      return;
    }

    ocrEl.style.color = 'var(--accent)';
    ocrEl.textContent = `✅ ${lang === 'hi' ? 'मिला:' : 'Found:'} ${formatExpr(detected)}`;
    expression = detected.replace(/\s/g, '');
    updateDisplay(formatExpr(expression));
    setStatus(lang === 'hi' ? 'मिल गया!' : 'Found!');
    showToast(lang === 'hi' ? `📐 पहचाना: ${formatExpr(detected)}` : `📐 Detected: ${formatExpr(detected)}`);
    calculate();
  } catch(e) {
    // Fallback: demo mode
    const demos = ['12+8', '25*4', '100-37', '64/8', '15+27'];
    const demo = demos[Math.floor(Math.random() * demos.length)];
    ocrEl.style.color = 'var(--accent)';
    ocrEl.textContent = `✅ ${lang === 'hi' ? 'नमूना:' : 'Demo:'} ${formatExpr(demo)}`;
    expression = demo;
    updateDisplay(formatExpr(demo));
    setStatus(lang === 'hi' ? 'नमूना मोड' : 'Demo mode');
    showToast(lang === 'hi' ? '🔌 API नहीं मिला, नमूना दिखा रहे हैं' : '🔌 API unavailable, showing demo');
    calculate();
  }
}

// ──────────────────────────────────────────
// TOAST
// ──────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ──────────────────────────────────────────
// KEYBOARD
// ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ('0123456789'.includes(e.key)) pressNum(e.key);
  else if (e.key === '+') pressOp('+');
  else if (e.key === '-') pressOp('-');
  else if (e.key === '*') pressOp('*');
  else if (e.key === '/') { e.preventDefault(); pressOp('/'); }
  else if (e.key === 'Enter' || e.key === '=') calculate();
  else if (e.key === 'Backspace') backspace();
  else if (e.key === 'Escape') clearAll();
  else if (e.key === '.') pressDot();
});

// ──────────────────────────────────────────
// INIT
// ──────────────────────────────────────────
renderHistory();
setStatus('');
</script>
